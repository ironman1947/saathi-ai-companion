services:
  - type: web
    name: saathi-ai-companion
    env: python
    pythonVersion: "3.11.9"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: saathi-db
          property: connectionString

databases:
  - name: saathi-db
    plan: free
    databaseName: saathi
    user: saathi_user

